name: md_env

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ───────────────────────────────────────────────────────────
  - python=3.10.*

  # ── MD simulation engine ──────────────────────────────────────────────
  - openmm>=8.0

  # ── AmberTools (includes antechamber, parmchk2, tleap, cpptraj, pdb4amber)
  - ambertools>=23

  # ── pytraj — Python interface to cpptraj
  - pytraj>=2.0

  # ── PDB preparation ──────────────────────────────────────────────────
  - pdbfixer>=1.8

  # ── Molecular format conversion ──────────────────────────────────────
  - openbabel>=3.1

  # ── Topology & parameter handling ────────────────────────────────────
  - parmed>=4.0

  # ── Trajectory analysis ──────────────────────────────────────────────
  - mdtraj>=1.9

  # ── Scientific stack ─────────────────────────────────────────────────
  - numpy>=1.23,<2.0
  - scipy>=1.10
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.12

  # ── Pip-installable packages ────────────────────────────────────────
  - pip
  - pip:
      # Flask API
      - flask>=3.0
      - flask-cors>=4.0

      # Cheminformatics
      - rdkit>=2024.3

      # Ligand-protein interaction fingerprints
      - prolif>=2.0

      # Trajectory analysis (MDAnalysis)
      - MDAnalysis>=2.8

      # PDB parsing
      - biopandas>=0.4
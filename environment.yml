name: md_env

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ───────────────────────────────────────────────────────────
  - python=3.10

  # ── MD simulation engine ──────────────────────────────────────────────
  - openmm::openmm

  # ── AmberTools (includes antechamber, parmchk2, tleap, cpptraj, pdb4amber)
  - ambertools

  # ── pytraj — Python interface to cpptraj
  - pytraj

  # ── PDB preparation ──────────────────────────────────────────────────
  - pdbfixer

  # ── Molecular format conversion ──────────────────────────────────────
  - openbabel

  # ── Topology & parameter handling ────────────────────────────────────
  - parmed

  # ── Trajectory analysis ──────────────────────────────────────────────
  - mdtraj

  # ── Scientific stack ─────────────────────────────────────────────────
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn

  # ── RDKit (conda-forge)
  - rdkit

  # ── Pip-installable packages ────────────────────────────────────────
  - pip
  - pip:
      - flask>=3.0
      - flask-cors>=4.0
      - prolif>=2.0
      - MDAnalysis>=2.8
      - biopandas>=0.4
name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run API Endpoint Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t md-simulation .

      - name: Run Tests in Docker
        run: docker run --rm md-simulation python -m pytest tests/test_api.py -v
